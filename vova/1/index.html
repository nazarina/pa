<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Итоговое тестирование за 3 класс</title>
    <style>
        :root {
            --soft-pink: #fff0f3;
            --soft-purple: #f3f0ff;
            --accent-color: #008080;
            --deep-accent: #800000;
            --text-main: #4a4a4a;
            --white: #ffffff;
            --button-grad: linear-gradient(to top, #800000 0%, #d63031 100%);
            --grey-light: #f8f9fa;
            --grey-border: #e9ecef;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--soft-purple);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--soft-pink);
        }

        h1 {
            color: var(--deep-accent);
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subject-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .nav-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        .test-section {
            display: none;
        }

        .test-section.active {
            display: block;
        }

        .question-card {
            background: var(--grey-light);
            border: 1px solid var(--grey-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2d3748;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: var(--white);
            border: 1px solid var(--grey-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .option-label:hover {
            background: var(--soft-pink);
            border-color: #ffcbd1;
        }

        .option-label input {
            margin-right: 12px;
            accent-color: var(--accent-color);
            width: 18px;
            height: 18px;
        }

        .option-label.selected {
            border-color: var(--accent-color);
            background: #e6f2f2;
        }

        .submit-container {
            text-align: center;
            margin-top: 30px;
        }

        .main-button {
            background: var(--button-grad);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(128, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .main-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(128, 0, 0, 0.3);
        }

        .results-section {
            display: none;
            background: var(--white);
        }

        .grade-box {
            text-align: center;
            padding: 30px;
            background: var(--soft-pink);
            border-radius: 15px;
            margin-bottom: 35px;
            border: 2px dashed var(--deep-accent);
        }

        .grade-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .grade-value {
            font-size: 72px;
            font-weight: 900;
            color: var(--deep-accent);
            margin: 15px 0;
        }

        .report-section {
            margin-top: 30px;
        }

        .report-item {
            border-bottom: 1px solid var(--grey-border);
            padding: 15px 0;
            margin-bottom: 15px;
            padding-left: 15px;
            border-radius: 0 8px 8px 0;
        }

        .report-item.wrong {
            border-left: 4px solid var(--deep-accent);
            background: #fff8f8;
        }

        .report-item.correct {
            border-left: 4px solid var(--accent-color);
            background: #f4faf6;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .badge.wrong { background: #ffe3e3; color: var(--deep-accent); }
        .badge.correct { background: #d1ebd9; color: var(--accent-color); }

        .recommendation-box {
            background: #f0f7f7;
            border-left: 5px solid var(--accent-color);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin-top: 30px;
        }

        .recommendation-box h3 {
            margin-top: 0;
            color: var(--accent-color);
        }

        .recommendation-list {
            padding-left: 20px;
            margin-bottom: 0;
        }

        .recommendation-list li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Итоговое тестирование за курс 3 класса</h1>
    </header>

    <div class="subject-selector" id="selectors">
        <button class="nav-btn active" onclick="switchSubject('math')">Математика</button>
        <button class="nav-btn" onclick="switchSubject('russian')">Русский язык</button>
        <button class="nav-btn" onclick="switchSubject('world')">Окружающий мир</button>
    </div>

    <div id="math-test" class="test-section active">
        <form id="math-form">
            <div class="questions-container" id="math-questions"></div>
            <div class="submit-container">
                <button type="button" class="main-button" onclick="calculateResult('math')">Завершить тест по математике</button>
            </div>
        </form>
    </div>

    <div id="russian-test" class="test-section">
        <form id="russian-form">
            <div class="questions-container" id="russian-questions"></div>
            <div class="submit-container">
                <button type="button" class="main-button" onclick="calculateResult('russian')">Завершить тест по русскому языку</button>
            </div>
        </form>
    </div>

    <div id="world-test" class="test-section">
        <form id="world-form">
            <div class="questions-container" id="world-questions"></div>
            <div class="submit-container">
                <button type="button" class="main-button" onclick="calculateResult('world')">Завершить тест по окружающему миру</button>
            </div>
        </form>
    </div>

    <div id="results-block" class="results-section">
        <div class="grade-box">
            <div class="grade-title" id="grade-title">Твоя оценка по предмету</div>
            <div class="grade-value" id="grade-value">5</div>
            <div id="percentage-value" style="font-weight: 600; color: var(--text-main); font-size: 18px;">Правильных ответов: 95% (19 из 20)</div>
        </div>

        <div class="recommendation-box" id="recommendation-box">
            <h3>Рекомендации по повторению тем:</h3>
            <ul class="recommendation-list" id="recommendation-list"></ul>
        </div>

        <div class="report-section">
            <h3>Подробный отчет по каждому вопросу:</h3>
            <div id="detailed-report"></div>
        </div>

        <div class="submit-container" style="margin-top: 40px;">
            <button class="main-button" onclick="resetCurrentTest()">Пройти тест заново</button>
        </div>
    </div>
</div>

<script>
    const database = {
        math: [
            { id: 1, topic: "Комплексные текстовые задачи в 3 действия", q: "В три детских сада развезли 100 кг земляники. В первый детский сад привезли 36 кг, во второй — на 8 кг меньше, чем в первый. Сколько килограммов земляники привезли в третий детский сад?", o: ["28 кг", "36 кг", "64 кг"], a: 1 },
            { id: 2, topic: "Внетабличное умножение двузначного числа на однозначное", q: "Вычисли значение числового выражения: 14 * 6 - 29", o: ["55", "45", "65"], a: 0 },
            { id: 3, topic: "Внетабличное деление двузначного числа на однозначное", q: "Найди корень выражения: 78 : 3 + 14", o: ["40", "36", "38"], a: 0 },
            { id: 4, topic: "Деление двузначного числа на двузначное методом подбора", q: "Вычисли: 96 : 16 * 12", o: ["72", "60", "84"], a: 0 },
            { id: 5, topic: "Деление с остатком и его проверка", q: "Какое число получится в остатке при делении 53 на 7?", o: ["3", "4", "2"], a: 1 },
            { id: 6, topic: "Уравнения на нахождение неизвестного множителя, делимого, делителя", q: "Реши уравнение и найди Х: 84 : Х = 6", o: ["14", "16", "78"], a: 0 },
            { id: 7, topic: "Порядок выполнения действий в выражениях со скобками", q: "Найди значение выражения: 120 - (45 + 35) : 4", o: ["100", "110", "115"], a: 0 },
            { id: 8, topic: "Числа в пределах 1000: разрядный состав", q: "Какое число состоит из 5 сотен, 2 десятков и 7 единиц?", o: ["572", "527", "257"], a: 1 },
            { id: 9, topic: "Сравнение трехзначных чисел", q: "Какой знак нужно поставить вместо многоточия: 400 - 1 ... 300 + 99?", o: [">", "<", "="], a: 2 },
            { id: 10, topic: "Приемы устных вычислений в пределах 1000", q: "Вычисли: 630 : 7 + 210", o: ["290", "300", "280"], a: 1 },
            { id: 11, topic: "Письменное сложение трехзначных чисел в столбик", q: "Найди сумму чисел: 356 + 278", o: ["634", "534", "624"], a: 0 },
            { id: 12, topic: "Письменное вычитание трехзначных чисел в столбик", q: "Найди разность чисел: 703 - 425", o: ["278", "288", "378"], a: 0 },
            { id: 13, topic: "Площадь фигуры и единицы площади (кв. см, кв. дм, кв. м)", q: "Длина прямоугольника равна 9 см, а ширина — 4 см. Найди площадь этого прямоугольника.", o: ["26 кв. см", "36 кв. см", "13 кв. см"], a: 1 },
            { id: 14, topic: "Периметр прямоугольника и квадрата", q: "Периметр квадрата равен 32 см. Чему равна площадь этого квадрата?", o: ["64 кв. см", "32 кв. см", "16 кв. см"], a: 0 },
            { id: 15, topic: "Единицы массы и их соотношения (грамм, килограмм, центнер)", q: "Вырази и посчитай: 3 ц 50 кг + 150 кг. Сколько центнеров получится?", o: ["5 ц", "4 ц", "500 ц"], a: 0 },
            { id: 16, topic: "Доли: нахождение доли числа и числа по его доле", q: "Длина шестой части отрезка равна 4 см. Какова полная длина этого отрезка?", o: ["24 см", "10 см", "2 см"], a: 0 },
            { id: 17, topic: "Текстовые задачи на увеличение/уменьшение в несколько раз", q: "В парке посадили 48 берез, а кленов — в 4 раза меньше. На сколько больше берез, чем кленов, посадили в парке?", o: ["На 36", "На 12", "На 40"], a: 0 },
            { id: 18, topic: "Задачи на расчет стоимости (цена, количество, стоимость)", q: "За 3 одинаковые тетради заплатили 27 рублей. Сколько стоят 5 таких же тетрадей?", o: ["45 рублей", "35 рублей", "54 рубля"], a: 0 },
            { id: 19, topic: "Геометрические понятия: окружность, круг, радиус и диаметр", q: "Радиус окружности равен 7 см. Чему равен её диаметр?", o: ["14 см", "21 см", "49 см"], a: 0 },
            { id: 20, topic: "Логические задачи на упорядочивание множеств", q: "Юра выше Сережи, а Сережа выше Толи. Кто из мальчиков самый маленький ростом?", o: ["Юра", "Сережа", "Толя"], a: 2 }
        ],
        russian: [
            { id: 1, topic: "Состав слова: корень, приставка, суффикс, окончание", q: "В каком слове приставка выделена НЕВЕРНО?", o: ["(по)белка", "(на)дпись", "(по)дорожник"], a: 0 },
            { id: 2, topic: "Правописание слов с проверяемыми непроизносимыми согласными", q: "В каком слове пишется буква Т?", o: ["Ужас..ный", "Прекрас..ный", "Мес..ный"], a: 2 },
            { id: 3, topic: "Правописание слов с парными согласными в корне", q: "Укажи слово, где пропущена буква Г:", o: ["Мя..кий", "Ле..кий", "Ночле..ка"], a: 2 },
            { id: 4, topic: "Правописание безударных гласных в корне слова", q: "Какое проверочное слово подобрано НЕВЕРНО?", o: ["Удивлять — диво", "Тяжелый — тяга", "Стрелять — стрела"], a: 2 },
            { id: 5, topic: "Разделительные твердый (Ъ) и мягкий (Ь) знаки", q: "В каком слове пропущен РАЗДЕЛИТЕЛЬНЫЙ твердый знак (Ъ)?", o: ["Вороб..и", "С..ежился", "В..юга"], a: 1 },
            { id: 6, topic: "Части речи: Имя существительное. Род и число", q: "Какое из существительных относится к ЖЕНСКОМУ роду?", o: ["Картофель", "Мебель", "Тюль"], a: 1 },
            { id: 7, topic: "Правописание мягкого знака (Ь) на конце существительных после шипящих", q: "В каком слове на конце НЕ нужно писать Ь?", o: ["Полноч..", "Плащ..", "Мыш.."], a: 1 },
            { id: 8, topic: "Части речи: Имя прилагательное. Изменение по родам", q: "В каком словосочетании имя прилагательное стоит в СРЕДНЕМ роде?", o: ["Синее море", "Ранняя весна", "Свежий хлеб"], a: 0 },
            { id: 9, topic: "Части речи: Местоимение. Личные местоимения", q: "Укажи личное местоимение 2-го лица множественного числа:", o: ["Мы", "Вы", "Они"], a: 1 },
            { id: 10, topic: "Части речи: Глагол. Времена глагола", q: "Какой из глаголов стоит в форме БУДУЩЕГО времени?", o: ["Напишет", "Рисовал", "Смотрит"], a: 0 },
            { id: 11, topic: "Правописание НЕ с глаголами", q: "Укажи строку, где раздельное написание НЕ нарушено:", o: ["(не)навидеть врага", "(не)хотеть спать", "(не)доумевать по поводу ответа"], a: 1 },
            { id: 12, topic: "Текст и его типы: повествование, описание, рассуждение", q: "К какому типу относится текст, в котором объясняются причины явлений и событий и ставится вопрос 'почему?'?", o: ["Описание", "Повествование", "Рассуждение"], a: 2 },
            { id: 13, topic: "Главные и второстепенные члены предложения", q: "Каким членом предложения является выделенное слово: 'На ветках березы звонко пели СНИГИРИ.'?", o: ["Подлежащее", "Сказуемое", "Второстепенный член"], a: 0 },
            { id: 14, topic: "Простые и сложные предложения", q: "Укажи сложное предложение (знаки препинания не расставлены):", o: ["Наступила осень и птицы улетели.", "Ребята весело играли на школьном дворе.", "Мама купила спелые яблоки и груши."], a: 0 },
            { id: 15, topic: "Слова с непроверяемыми написаниями (Словарные)", q: "В каком слове допущена орфографическая ошибка?", o: ["Коллектив", "Пасажир", "Суббота"], a: 1 },
            { id: 16, topic: "Звуки и буквы. Правописание гласных после шипящих", q: "В каком слове пропущена буква Ю?", o: ["Ч..вство", "Брош..ра", "Щ..ка"], a: 1 },
            { id: 17, topic: "Однокоренные слова и формы одного и того же слова", q: "Укажи пару слов, которая является формой одного слова, а не однокоренными словами:", o: ["Дом — домик", "Лес — в лесу", "Сад — садовник"], a: 1 },
            { id: 18, topic: "Лексика: Антонимы", q: "Подбери антоним к слову 'широкий':", o: ["Узкий", "Длинный", "Просторный"], a: 0 },
            { id: 19, topic: "Правописание предлогов со словами", q: "В каком варианте написание ошибочно?", o: ["Забежал за дом", "Спрыгнул с дерева", "По бежал по дороге"], a: 2 },
            { id: 20, topic: "Ударение в именах существительных", q: "В каком слове ударение поставлено ВЕРНО?", o: ["Торты́", "То́рты", "Торта́"], a: 1 }
        ],
        world: [
            { id: 1, topic: "Человек и общество: государственные праздники", q: "Какой государственный праздник отмечается в России 12 июня?", o: ["День Победы", "День России", "День народного единства"], a: 1 },
            { id: 2, topic: "Органы чувств человека и их гигиена", q: "Какой орган чувств человека отвечает за восприятие звуковой информации?", o: ["Орган слуха", "Орган зрения", "Орган обоняния"], a: 0 },
            { id: 3, topic: "Тела, вещества, частицы", q: "Что из перечисленного является ВЕЩЕСТВОМ?", o: ["Сахар", "Капля воды", "Железный гвоздь"], a: 0 },
            { id: 4, topic: "Разнообразие веществ (крахмал, сахар, соль)", q: "С помощью какого химического вещества (раствора) в лаборатории можно обнаружить крахмал в продуктах?", o: ["Раствор йода", "Чистая вода", "Уксус"], a: 0 },
            { id: 5, topic: "Воздух и его состав", q: "Какой газ из состава воздуха человек и животные поглощают при дыхании?", o: ["Азот", "Углекислый газ", "Кислород"], a: 2 },
            { id: 6, topic: "Вода. Свойства воды. Круговорот воды в природе", q: "Как называется процесс перехода воды из жидкого состояния в газообразное (пар)?", o: ["Испарение", "Конденсация", "Замерзание"], a: 0 },
            { id: 7, topic: "Что такое почва. Состав почвы", q: "Какое вещество в составе почвы обеспечивает её главное свойство — плодородие?", o: ["Песок", "Перегной (гумус)", "Глина"], a: 1 },
            { id: 8, topic: "Разнообразие растений (водоросли, мхи, папоротники, хвойные, цветковые)", q: "Какая группа растений никогда не имеет ни корней, ни стеблей, ни листьев, ни цветков?", o: ["Мхи", "Водоросли", "Папоротники"], a: 1 },
            { id: 9, topic: "Разнообразие животных (черви, моллюски, ракообразные, паукообразные, насекомые)", q: "К какой группе животных относятся пауки и скорпионы?", o: ["Насекомые", "Паукообразные", "Ракообразные"], a: 1 },
            { id: 10, topic: "Разнообразие животных (рыбы, земноводные, пресмыкающиеся, птицы, звери)", q: "К какой группе животных относится крокодил?", o: ["Земноводные", "Пресмыкающиеся (рептилии)", "Звери"], a: 1 },
            { id: 11, topic: "Размножение и развитие животных", q: "Какая стадия развития отсутствует у бабочек и жуков при развитии с полным превращением?", o: ["Куколка", "Личинка", "У этих насекомых есть все стадии (яйцо, личинка, куколка, взрослое насекомое)"], a: 2 },
            { id: 12, topic: "Грибы. Строение гриба. Правила сбора грибов", q: "Какая часть гриба находится глубоко в земле и всасывает воду с питательными веществами?", o: ["Грибница (мицелий)", "Шляпка", "Ножка"], a: 0 },
            { id: 13, topic: "Великий круговорот жизни (производители, потребители, разрушители)", q: "Какую роль в круговороте жизни выполняют бактерии и крупные почвенные грибы?", o: ["Производители", "Потребители", "Разрушители"], a: 2 },
            { id: 14, topic: "Организм человека: опорно-двигательная система", q: "Из каких двух важных составляющих частей состоит опорно-двигательная система человека?", o: ["Сердце и сосуды", "Скелет и мышцы", "Головной и спинной мозг"], a: 1 },
            { id: 15, topic: "Организм человека: пищеварительная система", q: "В каком органе пищеварительной системы начинается первоначальное измельчение и расщепление пищи?", o: ["В желудке", "В ротовой полости", "В тонком кишечнике"], a: 1 },
            { id: 16, topic: "Организм человека: дыхательная и кровеносная системы", q: "Какая система разносит кислород и питательные вещества по всему телу человека?", o: ["Дыхательная", "Нервная", "Кровеносная"], a: 2 },
            { id: 17, topic: "Правила здорового образа жизни и закаливания", q: "Какое правило гигиены и здорового образа жизни нарушено?", o: ["Чистить зубы два раза в день", "Читать книгу при плохом освещении лежа на боку", "Мыть руки перед едой"], a: 1 },
            { id: 18, topic: "Экология и охрана природы. Заповедники", q: "Как называется охраняемая природная территория, где полностью запрещена любая хозяйственная деятельность человека?", o: ["Ботанический сад", "Заповедник", "Городской парк"], a: 1 },
            { id: 19, topic: "Наша страна на карте (Города России)", q: "Какой город является столицей нашей Родины — Российской Федерации?", o: ["Санкт-Петербург", "Новосибирск", "Москва"], a: 2 },
            { id: 20, topic: "Экономика и деньги. Бюджет", q: "Как называются деньги, которые официально поступают в бюджет семьи или государства?", o: ["Доходы", "Расходы", "Налоги"], a: 0 }
        ]
    };

    let currentSubject = 'math';

    function initTests() {
        for (const [subject, questions] of Object.entries(database)) {
            const container = document.getElementById(`${subject}-questions`);
            container.innerHTML = '';
            
            questions.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `${index + 1}. ${item.q}`;
                card.appendChild(qText);
                
                const optionsList = document.createElement('div');
                optionsList.className = 'options-list';
                
                item.o.forEach((option, oIdx) => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = `label-${subject}-${item.id}-${oIdx}`;
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `question-${subject}-${item.id}`;
                    radio.value = oIdx;
                    radio.onclick = function() {
                        item.o.forEach((_, idx) => {
                            document.getElementById(`label-${subject}-${item.id}-${idx}`).classList.remove('selected');
                        });
                        label.classList.add('selected');
                    };
                    
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(option));
                    optionsList.appendChild(label);
                });
                
                card.appendChild(optionsList);
                container.appendChild(card);
            });
        }
    }

    function switchSubject(subject) {
        currentSubject = subject;
        document.querySelectorAll('.test-section').forEach(el => el.classList.remove('active'));
        document.getElementById('results-block').style.display = 'none';
        document.getElementById(`${subject}-test`).classList.add('active');
        
        const buttons = document.getElementById('selectors').getElementsByTagName('button');
        buttons[0].className = `nav-btn ${subject === 'math' ? 'active' : ''}`;
        buttons[1].className = `nav-btn ${subject === 'russian' ? 'active' : ''}`;
        buttons[2].className = `nav-btn ${subject === 'world' ? 'active' : ''}`;
        document.getElementById('selectors').style.display = 'flex';
    }

    function calculateResult(subject) {
        const questions = database[subject];
        const form = document.getElementById(`${subject}-form`);
        let correctCount = 0;
        let detailedReportHtml = '';
        let wrongTopics = new Set();
        
        questions.forEach((item, index) => {
            const selectedRadio = form.querySelector(`input[name="question-${subject}-${item.id}"]:checked`);
            const userAnswer = selectedRadio ? parseInt(selectedRadio.value) : null;
            const isCorrect = userAnswer === item.a;
            
            if (isCorrect) {
                correctCount++;
                detailedReportHtml += `
                    <div class="report-item correct">
                        <span class="badge correct">Верно</span>
                        <div class="question-text">${index + 1}. ${item.q}</div>
                        <p>Ответ ученика: <b>${item.o[userAnswer]}</b></p>
                        <p style="font-size: 14px; color: #666; margin-top: 5px;">Тема: ${item.topic}</p>
                    </div>
                `;
            } else {
                wrongTopics.add(item.topic);
                const answerText = userAnswer !== null ? item.o[userAnswer] : "Ответ не выбран";
                detailedReportHtml += `
                    <div class="report-item wrong">
                        <span class="badge wrong">Ошибка</span>
                        <div class="question-text">${index + 1}. ${item.q}</div>
                        <p>Выбранный ответ: <span style="color: var(--deep-accent); font-weight: 600;">${answerText}</span></p>
                        <p>Правильный ответ: <span style="color: var(--accent-color); font-weight: 600;">${item.o[item.a]}</span></p>
                        <p style="font-size: 14px; color: #666; margin-top: 5px;">Тема: ${item.topic}</p>
                    </div>
                `;
            }
        });
        
        const totalQuestions = questions.length;
        const percentage = Math.round((correctCount / totalQuestions) * 100);
        let grade = 2;
        
        if (percentage > 90) grade = 5;
        else if (percentage >= 75) grade = 4;
        else if (percentage >= 61) grade = 3;
        else grade = 2;
        
        document.getElementById(`${subject}-test`).classList.remove('active');
        document.getElementById('selectors').style.display = 'none';
        
        const resultsBlock = document.getElementById('results-block');
        resultsBlock.style.display = 'block';
        
        let subjName = subject === 'math' ? 'Математике' : subject === 'russian' ? 'Русскому языку' : 'Окружающему миру';
        document.getElementById('grade-title').innerText = `Твоя итоговая оценка по ${subjName}:`;
        document.getElementById('grade-value').innerText = grade;
        document.getElementById('percentage-value').innerText = `Правильных ответов: ${percentage}% (${correctCount} из ${totalQuestions})`;
        
        const recList = document.getElementById('recommendation-list');
        recList.innerHTML = '';
        
        if (wrongTopics.size === 0) {
            const li = document.createElement('li');
            li.innerHTML = '<b>Великолепный результат!</b> Ошибок нет. Весь курс 3 класса усвоен на отлично!';
            recList.appendChild(li);
        } else {
            wrongTopics.forEach(topic => {
                const li = document.createElement('li');
                li.innerHTML = `Повторить тему: <b>«${topic}»</b>`;
                recList.appendChild(li);
            });
        }
        
        document.getElementById('detailed-report').innerHTML = detailedReportHtml;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetCurrentTest() {
        document.getElementById(`${currentSubject}-form`).reset();
        document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
        switchSubject(currentSubject);
    }

    window.onload = initTests;
</script>
</body>
</html>
